[package]
name = "zero2prod"
version = "0.1.0"
edition = "2021"

[lib]
path = "src/lib.rs"

[[bin]]
path = "src/main.rs"
name = "zero2prod"

[dependencies]
actix-web = "4.10.2"
config = "0.11"
reqwest = "0.12.14"
serde = { version = "1.0.219", features = ["derive"] }
sqlx-cli = "0.8.3"
tokio = { version = "1.44.1", features = ["full"] }
